
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Semantic HTML and Table</title>
    <meta name="description" content="Semantic HTML5 structure and table with accessibility features">
</head>

<body>

    <!-- Part A: Semantic Page Structure -->
    <header>
        <h1>Student Information Portal</h1>
    </header>

    <nav>
        <a href="#home">Home</a> |
        <a href="#students">Students</a> |
        <a href="#contact">Contact</a>
    </nav>

    <main>
        <!-- Main content starts -->

        <section id="students">
            <h2>Student Details</h2>

            <!-- Part B: Table Creation -->
            <table border="1">
                <caption>Student Information Table</caption>

                <tr>
                    <th scope="col">Student ID</th>
                    <th scope="col">Name</th>
                    <th scope="col">Department</th>
                    <th scope="col">CGPA</th>
                </tr>

                <tr>

                </tr>

                <tr>
                    <td>55980</td>
                    <td>Anika</td>
                    <td>CSE</td>
                    <td>3.87</td>
                </tr>

                <tr>
                    <td>55981</td>
                    <td>Sarah</td>
                    <td>EEE</td>
                    <td>3.80</td>
                </tr>

                <tr>
                    <td>55982</td>
                    <td>Faisal</td>
                    <td>BBA</td>

                </tr>

                <tr>
                    <td>55983</td>
                    <td>Abeer</td>

                </tr>

            </table>
        </section>

    </main>

    <footer>
    <p>
        &copy; 2026 Student Portal | AIUB
        <img src="aiub-logo.png"
             alt="AIUB Logo"
             width="20"
             title="AIUB"
             style="vertical-align: middle; margin-left: 5px;">
    </p>
</footer>


</body>
</html>
